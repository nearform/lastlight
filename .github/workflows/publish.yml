name: Publish release

# The release pipeline: on a GitHub Release, run CI checks, THEN build+push the
# Docker images to GHCR, THEN publish the npm packages — in that order, as three
# chained jobs (`images` needs `checks`, `npm` needs `images`).
#
# npm publishing is AUTOMATED here again (reversing migration decision 15): the
# `npm` job publishes the workspace's six public packages (workflow-engine →
# shared → agentic-pi → core → cli → evals) via npm OIDC TRUSTED PUBLISHING — no NPM_TOKEN
# secret, provenance attestations on. It needs `id-token: write` (set on the job)
# and a trusted-publisher entry configured on npmjs.com for EACH package (repo
# nearform/lastlight, workflow publish.yml). Images-before-npm is enforced by
# job-chaining (`npm` needs `images`): the CLI only reaches npm once the
# `:vX.Y.Z` images it tells hosts to pull already exist in GHCR — otherwise a
# `npm i -g lastlight@X.Y.Z && server update` in the gap would fail the pull.
#
# `checks` runs FIRST, so a failing test/type error fails the release in a
# couple of minutes BEFORE the slow Docker build — instead of after images are
# already pushed. The `images` job then trusts it and doesn't re-run the test
# suite. `checks` REUSES the CI workflow (`ci.yml` via `workflow_call`) so the
# release runs the exact same typecheck + tests as every PR — one definition,
# no drift.
#
# `workflow_dispatch` rebuilds the IMAGES for a specific tag only (still gated
# behind `checks`); it never publishes to npm — the `npm` job is gated to
# `release` events.
#
# Build the four locally-built images (agent + sandbox-base + sandbox +
# sandbox-qa) once and push them to GHCR, so `lastlight server update` PULLS them
# on the deploy host instead of building from source (minutes → seconds).
#
# The stock sidecar images (coredns / nginx / otel-collector / caddy) are pulled
# from Docker Hub by docker-compose and are NOT built here. `egress-init` reuses
# the agent image, so it's covered too.
#
# CACHING: driven by `docker buildx bake` against docker-bake.hcl. Each image
# has a per-image **registry** build cache (ghcr.io/nearform/lastlight-<img>:
# buildcache) that any run can read, so unchanged layers survive across releases.
#
#   Why registry and not `type=gha`: this workflow only runs on a RELEASE (a tag
#   ref). GitHub Actions cache is ref-scoped — a run restores only caches written
#   by its own ref or the default branch — so a cache on tag vA was invisible to
#   the next release on tag vB, and every release built cold.
#
#   Why bake and not four separate `buildx build`s: the sandbox leaves are FROM
#   sandbox-base. Built separately FROM the *pushed* base tag, their cache keyed
#   on the base's image DIGEST — which drifts every build (config timestamp +
#   provenance attestation) even when the layers are identical, busting the leaf
#   cache and re-running the ~300 MB Chromium download. bake builds base + leaves
#   in ONE graph and wires `FROM lastlight-sandbox-base:latest` to
#   `target:sandbox-base`, so the leaf cache keys on the base's CONTENT, not its
#   pushed digest — stable across releases, and every image keeps its provenance
#   + SBOM attestations. See docker-bake.hcl for the full rationale.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag/ref to check out AND image tag to publish (e.g. v0.11.0)"
        required: true
        type: string

concurrency:
  group: publish-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push images to GHCR

jobs:
  # Run the full CI suite (typecheck + tests + build) by REUSING ci.yml, against
  # the release tag. Gates `images` so a failure fails the release before the
  # slow Docker build ever starts.
  checks:
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ github.event.release.tag_name || inputs.tag }}

  images:
    needs: checks
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io/nearform
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      # Only move `:latest` on a real, non-prerelease Release — never when a
      # workflow_dispatch rebuilds an arbitrary (possibly older) tag.
      PUSH_LATEST: ${{ github.event_name == 'release' && github.event.release.prerelease == false }}
      # The bake targets use `context = "../.."` (the repo root — the monorepo
      # build context sits above apps/server/ where docker-bake.hcl lives).
      # Newer buildx guards reading a parent-dir context behind a filesystem
      # entitlement; this is a trusted first-party build reading its own repo, so
      # disable the FS entitlement check (the sanctioned escape hatch) rather than
      # hardcode the runner's absolute `--allow=fs.read=/home/runner/work` path.
      BUILDX_BAKE_ENTITLEMENTS_FS: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Required set: agent + sandbox-base + sandbox, built in one bake graph so
      # `sandbox` links to `target:sandbox-base` by content (see docker-bake.hcl).
      - name: Build & push core images
        # Invoke from apps/server/ (where docker-bake.hcl lives) so its
        # `context = "../.."` resolves to the repo root — buildx resolves bake
        # relative paths against the working dir, not the -f file's location.
        working-directory: apps/server
        run: docker buildx bake -f docker-bake.hcl --push core
        env:
          REGISTRY: ${{ env.REGISTRY }}
          TAG: ${{ env.TAG }}
          PUSH_LATEST: ${{ env.PUSH_LATEST }}
          GIT_SHA: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.date }}

      # Non-fatal optional tier — its own bake invocation so a failure can't block
      # the core images. It rebuilds sandbox-base as a content-keyed context
      # dependency (cache-restored in seconds), which is what keeps its Chromium
      # layer cached across releases.
      - name: Build & push sandbox-qa (non-fatal)
        continue-on-error: true
        working-directory: apps/server
        run: docker buildx bake -f docker-bake.hcl --push sandbox-qa
        env:
          REGISTRY: ${{ env.REGISTRY }}
          TAG: ${{ env.TAG }}
          PUSH_LATEST: ${{ env.PUSH_LATEST }}

  # Publish the six public npm packages — ONLY after `images` succeeds, and ONLY
  # for a real Release (a workflow_dispatch image rebuild never publishes to npm).
  # Typecheck + tests already ran in `checks` (transitively via `images`), so this
  # job only builds dist/ and publishes.
  npm:
    needs: images
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance — no NPM_TOKEN secret
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # OIDC trusted publishing (tokenless) needs a recent npm; the one bundled
      # with Node 22 predates it. pnpm 9 doesn't do the OIDC exchange itself, so
      # we pack with pnpm (rewrites `workspace:*` → the real version) and publish
      # the tarball with npm (does the OIDC exchange + provenance).
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

      # Publish in DEPENDENCY order so a consumer never sees a package before the
      # deps it pins exist on npm. Private packages (root, www, both dashboards)
      # are simply not in this list. Each `pnpm pack` rewrites `workspace:*` to the
      # concrete version; `npm publish <tarball>` mints provenance via OIDC.
      - name: Publish to npm (deps first, provenance via OIDC)
        run: |
          set -euo pipefail
          out="$(mktemp -d)"
          for pkg in lastlight-workflow-engine lastlight-shared agentic-pi lastlight-core lastlight lastlight-evals; do
            echo "::group::publish $pkg"
            ver="$(pnpm --filter "$pkg" exec -- node -p "require('./package.json').version" | tail -1)"
            # Skip versions already on npm so a release that bumps only a SUBSET of
            # packages (the common case) doesn't 403 on the unchanged ones — and
            # so the job is safe to re-run. Mirrors `pnpm -r publish`'s skip.
            if npm view "$pkg@$ver" version >/dev/null 2>&1; then
              echo "$pkg@$ver already on npm — skipping"
              echo "::endgroup::"
              continue
            fi
            # `pnpm --filter <pkg> pack` is invalid (filter implies recursive, which
            # `pack` rejects). Run `pnpm pack` INSIDE the package dir via `exec` so
            # it packs that one package — still rewriting `workspace:*` → concrete.
            pnpm --filter "$pkg" exec -- pnpm pack --pack-destination "$out"
            npm publish "$out"/*.tgz --access public --provenance
            rm -f "$out"/*.tgz
            echo "::endgroup::"
          done
