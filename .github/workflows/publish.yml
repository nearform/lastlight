name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  # Required for OIDC-based "trusted publishing" with npm. Without this
  # the OIDC token can't be minted and `npm publish` falls back to
  # token-based auth (which we don't configure).
  id-token: write

jobs:
  publish:
    name: build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted publishing landed in npm 11.5. Node 22 LTS ships an older
      # npm; pin to a current major to be safe.
      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      # Tag must match package.json version exactly. This catches the
      # common footgun of tagging v0.2.0 while package.json still says
      # 0.1.0 — without the check, `npm publish` would happily publish
      # 0.1.0 again (or fail with "version already exists" if the
      # previous one's still there).
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package.json version $pkg"
            exit 1
          fi
          echo "Publishing version $pkg"

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      # Unit tests only — integration tests cost real money and the CI
      # workflow already gated those on every PR / push to main.
      - name: Unit tests
        run: npm run test:unit

      # --provenance attaches a signed statement linking the published
      # package to this exact workflow run + commit SHA. Visible on the
      # npm package page.
      # --access public is required for scoped packages but harmless
      # for unscoped ones.
      - name: Publish to npm
        run: npm publish --provenance --access public
