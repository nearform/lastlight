name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default: read-only.
permissions:
  contents: read

jobs:
  ci:
    name: lint, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Biome is the lint gate (non-writing; lint diagnostics fail the build).
      # Formatting is intentionally NOT enforced here — it's a local convenience
      # (`npm run format` / editor-on-save), so a pure whitespace drift never
      # reds a PR. The TypeScript compiler in `--noEmit` mode remains the
      # type-level static-analysis gate.
      - name: Lint (biome)
        run: npm run lint

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      # Integration tests are LLM-backed (cost real money). They auto-skip
      # in the runner if OPENAI_API_KEY is empty, so this step is safe to
      # leave on for every CI run — it becomes a no-op until the secret is
      # configured in repo settings.
      #
      # The sandbox integration test also requires QEMU + a working
      # accelerator. GitHub-hosted Ubuntu runners may or may not expose
      # /dev/kvm — the preflight check inside agentic-pi will skip the
      # sandbox test cleanly if not available. We don't install QEMU on
      # CI by default (heavy dep) so the sandbox test is expected to skip
      # on standard runners.
      - name: Integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run test:integration
