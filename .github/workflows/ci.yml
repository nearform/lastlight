name: CI

on:
  pull_request:
  push:
    branches:
      - main
  # Callable as a reusable workflow so the release pipeline (publish.yml) runs
  # the exact same checks before building images — one definition, no drift.
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out (defaults to the triggering ref)"
        required: false
        type: string

# Cancel superseded runs on the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Empty for push/pull_request → checkout uses the triggering ref. Set
          # by publish.yml's workflow_call to check out the release tag.
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (server)
        run: npx tsc --noEmit

      - name: Typecheck (dashboard)
        run: npx tsc -b dashboard

      - name: Test
        run: npx vitest run
