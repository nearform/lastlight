name: CI

on:
  pull_request:
  push:
    branches:
      - main
  # Callable as a reusable workflow so the release pipeline (publish.yml) runs
  # the exact same checks before building images — one definition, no drift.
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out (defaults to the triggering ref)"
        required: false
        type: string

# Cancel superseded runs on the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Empty for push/pull_request → checkout uses the triggering ref. Set
          # by publish.yml's workflow_call to check out the release tag.
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Persist Turbo's local content-hash cache between runs so untouched
      # packages replay instead of rebuilding. Keyed on the commit SHA (a fresh
      # write every run) with a prefix restore-key so any prior run on this OS
      # seeds the cache — Turbo then does per-package skipping on top.
      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Typecheck, test, build
        run: pnpm turbo run typecheck test build
