name: Publish Docker images

# Build the four locally-built images (agent + sandbox-base + sandbox +
# sandbox-qa) once in CI and push them to GHCR, so `lastlight server update`
# PULLS them on the deploy host instead of building from source (minutes →
# seconds). Same deliberate trigger as npm publish: cutting a GitHub Release.
# `workflow_dispatch` allows a manual (re)build of a specific tag.
#
# The stock sidecar images (coredns / nginx / otel-collector / caddy) are pulled
# from Docker Hub by docker-compose and are NOT built here. `egress-init` reuses
# the agent image, so it's covered too.
#
# CACHING: every image still builds each release (a release always needs a
# complete, matching set of image tags for the pin-based pull to resolve — see
# lastlight-prebuilt-images), but each build restores unchanged layers from a
# per-image **registry** cache (`--cache-from/--cache-to type=registry,ref=$REGISTRY/
# lastlight-<img>:buildcache`), so a dashboard-only release re-tags near-identical
# sandbox images in seconds instead of rebuilding them (notably sandbox-qa's
# ~300 MB Chromium).
#
# Why registry and not `type=gha`: this workflow only ever runs on a RELEASE,
# i.e. a tag ref (refs/tags/vX.Y.Z). GitHub Actions cache is ref-scoped — a run
# can only restore caches written by its own ref or by the default branch — so a
# cache written on tag vA is invisible to the next release on tag vB, and every
# release built cold (verified: v0.12.6 restored 1 layer, ran 23). A registry
# cache is just a manifest in GHCR that any run can read, so it survives across
# releases. `image-manifest=true,oci-mediatypes=true` keeps the cache manifest
# in the format GHCR accepts.
#
# FROM resolution: the buildx docker-container driver resolves `FROM` from a
# registry, not the local image store, so the sandbox leaves can't see a
# locally-tagged base. We push sandbox-base first, then build the leaves with
# `--build-arg BASE_IMAGE=<pushed GHCR base ref>` (the Dockerfiles default the
# arg to the local tag, so host `--local` builds are unchanged).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag/ref to check out AND image tag to publish (e.g. v0.11.0)"
        required: true
        type: string

concurrency:
  group: docker-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io/nearform
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      # Only move `:latest` on a real, non-prerelease Release — never when a
      # workflow_dispatch rebuilds an arbitrary (possibly older) tag.
      PUSH_LATEST: ${{ github.event_name == 'release' && github.event.release.prerelease == false }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Only the agent Dockerfile takes GIT_SHA / BUILD_DATE (drift banner).
      - name: Build & push agent
        run: |
          LATEST=""; [ "$PUSH_LATEST" = "true" ] && LATEST="-t $REGISTRY/lastlight-agent:latest"
          docker buildx build --push \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg BUILD_DATE=${{ steps.meta.outputs.date }} \
            --cache-from type=registry,ref=$REGISTRY/lastlight-agent:buildcache \
            --cache-to type=registry,ref=$REGISTRY/lastlight-agent:buildcache,mode=max,image-manifest=true,oci-mediatypes=true \
            -t "$REGISTRY/lastlight-agent:$TAG" $LATEST \
            -f Dockerfile .

      # Push sandbox-base first so the leaves can pull it as their FROM.
      - name: Build & push sandbox-base
        run: |
          LATEST=""; [ "$PUSH_LATEST" = "true" ] && LATEST="-t $REGISTRY/lastlight-sandbox-base:latest"
          docker buildx build --push \
            --cache-from type=registry,ref=$REGISTRY/lastlight-sandbox-base:buildcache \
            --cache-to type=registry,ref=$REGISTRY/lastlight-sandbox-base:buildcache,mode=max,image-manifest=true,oci-mediatypes=true \
            -t "$REGISTRY/lastlight-sandbox-base:$TAG" $LATEST \
            -f sandbox-base.Dockerfile .

      - name: Build & push sandbox
        run: |
          LATEST=""; [ "$PUSH_LATEST" = "true" ] && LATEST="-t $REGISTRY/lastlight-sandbox:latest"
          docker buildx build --push \
            --build-arg BASE_IMAGE="$REGISTRY/lastlight-sandbox-base:$TAG" \
            --cache-from type=registry,ref=$REGISTRY/lastlight-sandbox:buildcache \
            --cache-to type=registry,ref=$REGISTRY/lastlight-sandbox:buildcache,mode=max,image-manifest=true,oci-mediatypes=true \
            -t "$REGISTRY/lastlight-sandbox:$TAG" $LATEST \
            -f sandbox.Dockerfile .

      # Non-fatal: browser-QA is an optional tier; a failure just means QA phases
      # skip until the image is present (mirrors the CLI's buildImages).
      - name: Build & push sandbox-qa (non-fatal)
        continue-on-error: true
        run: |
          LATEST=""; [ "$PUSH_LATEST" = "true" ] && LATEST="-t $REGISTRY/lastlight-sandbox-qa:latest"
          docker buildx build --push \
            --build-arg BASE_IMAGE="$REGISTRY/lastlight-sandbox-base:$TAG" \
            --cache-from type=registry,ref=$REGISTRY/lastlight-sandbox-qa:buildcache \
            --cache-to type=registry,ref=$REGISTRY/lastlight-sandbox-qa:buildcache,mode=max,image-manifest=true,oci-mediatypes=true \
            -t "$REGISTRY/lastlight-sandbox-qa:$TAG" $LATEST \
            -f sandbox-qa.Dockerfile .
