name: Deploy www

# Deploy the marketing/docs site (apps/www → lastlight.dev) to Cloudflare.
#
# A deploy-only LEAF job — deliberately NOT part of the shared CI (ci.yml). It
# is RELEASE-GATED: it fires on a published GitHub Release (like the npm/image
# publish), so the live docs track the released code, not every push to `main`.
# The site re-renders `apps/server/spec` at build time (apps/www's sync-spec), so
# a spec edit ships with the release that carries it. `workflow_dispatch` is the
# manual escape hatch for an out-of-band docs deploy between releases.
#
# Requires the CLOUDFLARE_API_TOKEN repo secret (a token scoped to Workers
# deploys on the lastlight.dev zone account) — set by a human, referenced here.
on:
  release:
    types: [published]
  workflow_dispatch:

# One deploy at a time; let a newer run supersede an in-flight one.
concurrency:
  group: deploy-www
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # sync-spec (prebuild) copies apps/server/spec → the site's content dir,
      # then astro builds ./dist.
      - name: Build site
        run: pnpm --filter lastlight-www build

      - name: Deploy to Cloudflare
        run: pnpm exec wrangler deploy
        working-directory: apps/www
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
