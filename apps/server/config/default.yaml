# Repositories Last Light manages. Set an explicit list in your private overlay
# ($LASTLIGHT_OVERLAY_DIR/config.yaml), which replaces this one wholesale;
# webhooks for repos not listed are filtered at the connector level. When left
# EMPTY (the default), the managed list is instead sourced from the GitHub App
# installation itself — the repos it can access, discovered at boot and kept
# live by installation webhooks — so an org install that already limits the App
# to a subset of repos need not maintain a second copy here. See
# src/managed-repos.ts.
managedRepos: []

# The GitHub App slug (no `[bot]` suffix). Single source of truth for the bot's
# identity: the incoming `@mention` handle (e.g. `@last-light`), the derived
# `botLogin` (`<botName>[bot]`, self-comment/self-review filter), and the git
# commit author. Override in your overlay `config.yaml` or via the
# `GITHUB_APP_BOT_NAME` env var — e.g. set `nearform-lastlight` for the
# Nearform app so it triggers on `@nearform-lastlight`.
botName: last-light

models:
  default: anthropic/claude-sonnet-4-6
  # Per-task overrides keyed by phase or helper name, e.g.:
  #   architect: anthropic/claude-opus-4-8
  #   classifier: anthropic/claude-haiku-4-5-20251001   # the intent-routing helper
  #   screener: anthropic/claude-haiku-4-5-20251001     # the prompt-injection screener
  # A per-task entry wins over `default`. `classifier`/`screener` are the cheap
  # one-shot helpers (src/engine/llm.ts); when unset they fall back to the first
  # configured provider's fast model, NOT `default`.

variants: {}

otel:
  enabled: false
  serviceName: lastlight
  includeContent: false
  forwardToSandbox: true
  strict: false
  collectorHosts: []

sandbox:
  backend: gondolin
  maxTurns: 200

# Where the per-phase build handoff docs (architect-plan.md, status.md,
# executor-summary.md, reviewer-verdict.md, …) live:
#   repo   — committed into the target repo under .lastlight/issue-N/ (default,
#            the docs ride the working branch and link to GitHub blob URLs).
#   server — persisted on the Last Light server under $STATE_DIR/build-assets/,
#            injected into each phase from outside the repo (never committed)
#            and linked to the admin dashboard.
buildAssets:
  location: repo

# Global concurrency limiter (issue #172). Caps how many sandboxed workflow
# runs execute at once; excess triggers are persisted as `queued` in
# workflow_runs and admitted when a slot frees. Resumes/orphan restarts bypass
# the cap (finish in-flight work first). Queued runs older than
# maxQueueWaitMs are cancelled with a "waited too long" notice.
concurrency:
  maxWorkflows: 4          # env override: MAX_CONCURRENT_WORKFLOWS
  maxQueueWaitMs: 3600000  # 1 hr; env override: MAX_QUEUE_WAIT_MS

# Sandbox-workspace reaping (issue #106). Every task clones the target repo into
# $STATE_DIR/sandboxes/<taskId>/; the harness now owns cleanup of those clones so
# the disk stays bounded under cron-review churn (this replaces the out-of-band
# host cron). `reapOnCompletion` deletes an ephemeral run's workspace the moment
# it finishes successfully; reusable per-PR workspaces (pr-review/pr-fix/build)
# are kept as a warm cache and bounded only by the sweep below. The sweep is the
# backstop for failed/crashed leftovers: it removes non-live dirs older than
# retentionHours and, if more than maxDirs remain, evicts the oldest (LRU). A dir
# whose sandbox container is still running is never removed.
cleanup:
  sandbox:
    enabled: true              # master switch for the TTL/LRU sweep
    reapOnCompletion: true     # reap ephemeral workspaces on terminal success
    sweepSchedule: "0 * * * *" # hourly
    retentionHours: 12         # sweep dirs older than this
    maxDirs: 40                # LRU cap on total workspace dirs

# Pin which core version an instance runs. Set `deploy.version` to a git tag/ref
# (e.g. v0.10.6) in your private overlay's config.yaml — `lastlight server
# update|setup` then checks core out at that tag and rebuilds, instead of
# tracking `main`. Unset here (and the sentinels `main`/`latest`) means track
# `main` — today's behaviour. Overridable via the `LASTLIGHT_CORE_VERSION` env
# var for CI. Bump + commit in the overlay to drive deploys declaratively.
deploy:
  version: null

approval: {}

bootstrap:
  label: "lastlight:bootstrap"

explore:
  defaultRepo: null

review:
  postsCheck: false

disabled:
  workflows: []
  crons: []
  prompts: []
  skills: []
  agentContext: []

routes:
  github:
    issue_opened: issue-triage
    issue_answer: answer
    issue_reopened: issue-triage
    pr_opened: pr-review
    pr_synchronize: pr-review
    pr_reopened: pr-review
    approval_response: approval-response
    security_review: security-review
    verify: verify
    qa_test: qa-test
    demo: demo
    pr_fix: pr-fix
    pr_review: pr-review
    pr_comment: pr-comment
    issue_build: build
    issue_explore: explore
    issue_comment: issue-comment
    security_feedback: security-feedback
    explore_reply: explore-reply
  slack:
    reset: chat-reset
    status: status-report
    approve: approval-response
    reject: approval-response
    build: build
    triage: issue-triage
    review: pr-review
    security: security-review
    verify: verify
    qa_test: qa-test
    demo: demo
    explore: explore
    answer: answer
    chat: chat
    explore_reply: explore-reply

cron:
  webhooksEnabledCondition: true
