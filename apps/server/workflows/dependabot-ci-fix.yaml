kind: pr-fix
name: dependabot-ci-fix
description: |
  Fix a dependency-update PR (Dependabot / Renovate) that can't merge on its
  own â€” CI is red, or it's `behind` its base / `dirty` (merge conflict) /
  `blocked`: bring the branch up to date with its base, make CI green, and push.
  It never classifies or merges â€” once the pushed fix turns the checks green the
  `pr.checks_passed` webhook hands off to `dependabot-pr-merge`, the single owner
  of the classify â†’ label â†’ auto-merge decision. The one label it may apply is
  `requires-human`, when it can't land the PR (a fix it can't complete, or a
  `blocked` PR it can't unblock), so the nightly sweep stops re-attempting it.

  Triggered by:
    - pr.checks_failed webhook (a check_suite completed with a failure
      conclusion) â†’ routed here by the classifier when it recognises a
      dependency-update PR (src/engine/router.ts + this file's `classification`).
    - cron-dependabot-ci-fix backstop (`discover: red-dependency-prs`) â†’ fans
      out one run per PR whose checks are settled-failing OR whose
      `mergeable_state` is `behind` / `dirty` / `blocked`
      (src/cron/dependabot-discovery.ts). The `{{reason}}` says which.
# One in-place task-list comment that updates as the fix/assess phases run,
# rather than a comment per phase.
status_checklist: true
classification:
  intent: dependabot-ci-fix
  description: |
    DEPENDABOTCIFIX â€” a dependency-update pull request (opened by Dependabot or
    Renovate, e.g. "Bump <pkg> from X to Y", "chore(deps): update <pkg>") whose
    CI checks have FAILED and needs its build / lockfile / call sites repaired so
    the update can land. Choose this over REVIEW or BUILD when the subject is a
    red dependency-bump PR. Also choose it when a maintainer's comment asks the
    bot to handle/look at/fix such a PR and `PR CHECKS` is `failing` (with a
    `PR AUTHOR` of dependabot[bot]/renovate[bot]) â€” but keep REVIEW when they
    explicitly ask for a review.
  examples:
    - 'PR "Bump lodash from 4.17.20 to 4.17.21" by dependabot[bot] â€” its CI checks have failed. â†’ INTENT: DEPENDABOTCIFIX, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - 'PR "chore(deps): bump actions/checkout from 3 to 4" by dependabot[bot] â€” its CI checks have failed. â†’ INTENT: DEPENDABOTCIFIX, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - 'PR AUTHOR: dependabot[bot], PR CHECKS: failing, COMMENT: "@bot can you take a look at this?" â†’ INTENT: DEPENDABOTCIFIX, REPO: NONE, ISSUE: NONE, REASON: NONE'

phases:
  - name: fix
    label: Fix failing checks
    prompt: prompts/dependabot-ci-fix.md
    # `building`: install deps with the repo's package manager, then run the
    # test/lint/typecheck gate before committing.
    skill: building
    model: "{{models.pr-fix}}"
    messages:
      on_start: "On it â€” investigating the failing checks on PR #{{prNumber}}..."
      on_success: "**Fix pushed** to `{{branch}}`."
      on_failure: "**Couldn't auto-fix** the failing checks on PR #{{prNumber}} â€” leaving it for a human."
