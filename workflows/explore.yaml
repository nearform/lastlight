kind: explore
name: explore
classification:
  intent: explore
  description: |
    EXPLORE — The user wants help shaping an idea BEFORE writing code: "help me think through X", "brainstorm Y", "spec this out", "explore an idea for Z". A bare "explore" / "explore this" / "let's explore" is also EXPLORE — especially as a reply on an existing issue (ISSUE TITLE present), where the implicit object is the issue's idea. EXPLORE = shape the idea / write a spec; BUILD = write the code now.
  examples:
    - '"explore adding webhooks to cliftonc/drizby" → INTENT: EXPLORE, REPO: cliftonc/drizby, ISSUE: NONE, REASON: NONE'
    - '"explore" with ISSUE TITLE "Feature: Allow configuration of otel endpoints" → INTENT: EXPLORE, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - '"explore this" with ISSUE TITLE "Add webhook support" → INTENT: EXPLORE, REPO: NONE, ISSUE: NONE, REASON: NONE'
description: |
  Socratic idea-shaping loop: read the existing issue/thread for context, ask
  clarifying questions in a reply-gated loop until the shape is clear, then
  synthesize a detailed spec and publish it (as a comment on the originating
  issue for GitHub-initiated runs, or as a new issue in EXPLORE_DEFAULT_REPO
  for Slack-initiated runs).

trigger: explore
# Single in-place task-list comment/message instead of a comment per phase.
# Reply-gate questions and the published spec still post as standalone notes.
status_checklist: true

phases:
  - name: phase_0
    label: Context
    type: context

  - name: read_context
    label: Read existing context
    prompt: prompts/explore-read.md
    model: "{{models.explore}}"
    output_var: baseline
    unrestricted_egress: true
    web_search: true
    messages:
      on_start: "Cloning `{{owner}}/{{repo}}` and reading the codebase..."

  - name: socratic
    label: Socratic questioning
    prompt: prompts/explore-ask.md
    model: "{{models.explore}}"
    unrestricted_egress: true
    web_search: true
    generic_loop:
      max_iterations: 8
      until: "output.contains('READY')"
      interactive: true
      gate_kind: reply
      scratch_key: socratic
      # A degenerate turn (agent exits with no question) retries once; if it's
      # still empty, advance to synthesis with the Q&A gathered so far instead
      # of hard-failing the whole explore run.
      on_soft_failure:
        retries: 1
        then: complete
      gate_message: |
        _Just reply to this thread with your answers — no need to @mention me. I'll keep going until we have enough to write this up._
        _Say `we're done` at any point to jump straight to the spec draft._

  - name: synthesize
    label: Synthesize spec
    prompt: prompts/explore-synthesize.md
    model: "{{models.architect}}"
    output_var: spec
    unrestricted_egress: true
    web_search: true
    messages:
      on_start: "Writing up the spec from our conversation..."

  - name: publish
    label: Publish spec
    prompt: prompts/explore-publish.md
    model: "{{models.executor}}"
    output_var: publishResult
    on_success:
      set_phase: complete
    messages:
      on_start: "Publishing the spec..."
      on_success: "{{publishResult}}"
      on_failure: "Failed to publish the spec — see the logs for details."
