kind: pr-fix
name: pr-fix
description: "Lightweight PR fix — no architect/reviewer, just fix and push"
trigger: pr-fix
# Single in-place task-list comment/message instead of a comment per phase.
status_checklist: true

phases:
  - name: fix
    label: Fix
    prompt: prompts/pr-fix.md
    skill: building
    model: "{{models.pr-fix}}"
    messages:
      on_start: "On it — fixing PR #{{prNumber}}..."
      on_success: "**Fix pushed** to `{{branch}}`. CI should re-run automatically."
      on_failure: "**Fix failed** — I wasn't able to resolve this automatically."
