kind: build
name: build
classification:
  intent: build
  description: |
    BUILD — The user is ASKING YOU (the bot) to make code changes NOW in a GitHub repo: implement a feature, fix a bug, create/send a PR, resolve an issue with code. BUILD requires a GitHub target — either an explicit repo reference (owner/name or github.com URL) in the message, OR an ISSUE TITLE context line indicating the comment is a reply on an existing issue/PR. If neither is present, classify as CHAT — local filesystem operations ("delete files in ~/foo", "clean up my downloads"), shell-style commands, or vague "build something" with no target are NOT BUILD.
      BUILD is a REQUEST for NEW work directed at you. A comment that merely REPORTS work the human has ALREADY done is NOT BUILD — it is CHAT. Tells: past-tense ("fixed", "done", "implemented", "added a test", "pushed a fix", "handled it"), a reference to a commit the human made ("addressed in <sha>", "see commit abc123"), thanking you, or explaining/justifying a change they made in response to your review. These are status reports, not requests — classify them CHAT even when the comment is on a PR and even when it @-mentions you. Only classify BUILD when the human asks you to do NEW work (imperative request: "fix X", "now also handle Y", "can you update Z").
  examples:
    - '"build cliftonc/drizzle-cube#42" → INTENT: BUILD, REPO: cliftonc/drizzle-cube, ISSUE: 42, REASON: NONE'
    - '"lets build this!" with ISSUE TITLE "Security Review" → INTENT: BUILD, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - '"go ahead" with ISSUE TITLE "Add CSV export" → INTENT: BUILD, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - '"now also handle the GET /sql case please" with ISSUE TITLE "Port adapters" → INTENT: BUILD, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - '"Thanks @last-light — addressed in 49ccadf. Fixed the nested body in the core and added a regression test; point 3 is intentional, confirmed with the maintainer." with ISSUE TITLE "Port fastify/hono/nextjs adapters" → INTENT: CHAT, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - '"done, pushed a fix for the type error in 1a2b3c4" with ISSUE TITLE "Fix build" → INTENT: CHAT, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - '"delete any files in ~/work/lastlight/docs" → INTENT: CHAT, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - '"can you remove the old docs folder for me" (no ISSUE TITLE, no repo) → INTENT: CHAT, REPO: NONE, ISSUE: NONE, REASON: NONE'
    - '"build something cool" (no repo, no ISSUE TITLE) → INTENT: CHAT, REPO: NONE, ISSUE: NONE, REASON: NONE'
description: "Architect -> Executor -> Reviewer build cycle"
trigger: build
# Render progress as a single in-place task-list comment/message that updates
# as phases run, instead of a new comment per phase. The per-phase
# `messages.on_*` below become the one-line detail on each checklist step.
status_checklist: true

phases:
  - name: phase_0
    label: Context
    type: context

  - name: guardrails
    label: Guardrails
    prompt: prompts/guardrails.md
    model: "{{models.guardrails}}"
    variant: "{{variants.guardrails}}"
    on_output:
      contains_BLOCKED:
        action: fail
        message: "Guardrails check: BLOCKED"
        unless_label: "lastlight:bootstrap"
        unless_title_matches: "^(guardrails:|\\[guardrails\\])"
        bypass_message: |
          **Guardrails check: BLOCKED** — but this is a bootstrap task
          (label `lastlight:bootstrap` or "guardrails:" title prefix detected).
          Proceeding with the build cycle so the architect can plan, and the
          executor can install, the missing tooling. The guardrails report at
          `{{issueDir}}/guardrails-report.md` lists what's missing.
      contains_READY:
        action: continue
    messages:
      on_success: "READY — foundational tooling verified — [guardrails-report.md]({{artifactUrl guardrails-report.md}})"
      on_blocked: |
        **Guardrails check: BLOCKED** — missing foundational tooling.

        See the guardrails report on branch `{{branch}}` at `{{issueDir}}/guardrails-report.md`.
        Once you've added the missing tooling, ask me to build this issue again — the check will re-run against the current repo state.

  - name: architect
    label: Architect
    prompt: prompts/architect.md
    model: "{{models.architect}}"
    variant: "{{variants.architect}}"
    approval_gate: post_architect
    approval_artifact: architect-plan.md
    approval_gate_message: |
      **Architect analysis complete** — approval required before implementation.

      - Branch: `{{branch}}`
      - Plan: `{{issueDir}}/architect-plan.md`

      **Review & decide:** {{approvalUrl}}
      **Or comment:** `{{botMention}} approve` / `{{botMention}} reject [reason]`
    messages:
      # Single-line messages become the one-line detail on the checklist step,
      # so keep them concise and link the artifact on the branch.
      on_success: "Plan ready — [architect-plan.md]({{artifactUrl architect-plan.md}})"

  - name: executor
    label: Executor
    prompt: prompts/executor.md
    skill: building
    model: "{{models.executor}}"
    variant: "{{variants.executor}}"
    messages:
      on_start: "implementing the architect's plan…"
      on_skipped_done: "already completed"
      on_success: "Implemented — [executor-summary.md]({{artifactUrl executor-summary.md}})"

  - name: reviewer
    label: Reviewer
    prompt: prompts/reviewer.md
    # code-review: rubric for the review + re-review prompts.
    # building: the fix cycle (fix.md) runs under this node and needs the gate.
    skills: [code-review, building]
    model: "{{models.reviewer}}"
    variant: "{{variants.reviewer}}"
    output_var: review
    loop:
      max_cycles: 2
      on_request_changes:
        fix_prompt: prompts/fix.md
        fix_model: "{{models.fix}}"
        fix_variant: "{{variants.fix}}"
        re_review_prompt: prompts/re-reviewer.md
      approval_gate: post_reviewer
      approval_artifact: reviewer-verdict.md
      messages:
        on_cycle_start: "independent verification (cycle {{cycle}})…"
        on_approved: "Approved — [reviewer-verdict.md]({{artifactUrl reviewer-verdict.md}})"
        on_request_changes: "**Review: REQUEST_CHANGES** — [reviewer-verdict.md]({{artifactUrl reviewer-verdict.md}}) — fixing issues (cycle {{cycle}}/{{maxCycles}})..."
        on_fix_start: "**Starting fix loop** (cycle {{cycle}}/{{maxCycles}}) — addressing reviewer feedback..."
        on_fix_failed: "Fix cycle {{cycle}} failed. Proceeding to PR with known issues."
        on_max_cycles: "**Review: REQUEST_CHANGES** after {{maxCycles}} fix cycles — see [reviewer-verdict.md]({{artifactUrl reviewer-verdict.md}}). Proceeding with remaining issues noted."
        on_pause_for_approval: |
          **Review: REQUEST_CHANGES** — approval required before fix loop.

          - Verdict: `{{issueDir}}/reviewer-verdict.md`

          **Review & decide:** {{approvalUrl}}
          **Or comment:** `{{botMention}} approve` / `{{botMention}} reject [reason]`

  - name: pr
    label: PR
    prompt: prompts/pr.md
    model: "{{models.pr}}"
    variant: "{{variants.pr}}"
    on_success:
      set_phase: complete
    messages:
      on_start: "packaging changes for review…"
